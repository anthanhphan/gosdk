syntax = "proto3";

package user;

option go_package = "github.com/anthanhphan/gosdk/orianna/docs/examples/grpc/proto;userpb";

// User service provides CRUD operations and streaming examples
service UserService {
  // Unary RPCs
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
  
  // Server streaming RPC - stream users to client
  rpc StreamUsers(StreamUsersRequest) returns (stream User);
  
  // Client streaming RPC - batch create users
  rpc BatchCreateUsers(stream CreateUserRequest) returns (BatchCreateUsersResponse);
  
  // Bidirectional streaming RPC - chat/notification example
  rpc UserChat(stream ChatMessage) returns (stream ChatMessage);
}

// Messages

message User {
  int64 id = 1;
  string name = 2;
  string email = 3;
  int32 age = 4;
  string role = 5;
  bool active = 6;
  int64 created_at = 7;
  int64 updated_at = 8;
}

message GetUserRequest {
  int64 id = 1;
}

message GetUserResponse {
  User user = 1;
}

message ListUsersRequest {
  int32 page = 1;
  int32 limit = 2;
  bool active = 3;
  string sort_by = 4;
}

message ListUsersResponse {
  repeated User users = 1;
  Pagination pagination = 2;
}

message Pagination {
  int32 page = 1;
  int32 limit = 2;
  int32 total = 3;
}

message CreateUserRequest {
  string name = 1;
  string email = 2;
  int32 age = 3;
  string role = 4;
}

message CreateUserResponse {
  User user = 1;
}

message UpdateUserRequest {
  int64 id = 1;
  string name = 2;
  string email = 3;
  int32 age = 4;
}

message UpdateUserResponse {
  User user = 1;
}

message DeleteUserRequest {
  int64 id = 1;
}

message DeleteUserResponse {
  bool success = 1;
  string message = 2;
}

message StreamUsersRequest {
  int32 batch_size = 1;
}

message BatchCreateUsersResponse {
  repeated User users = 1;
  int32 count = 2;
}

message ChatMessage {
  int64 user_id = 1;
  string message = 2;
  int64 timestamp = 3;
}
